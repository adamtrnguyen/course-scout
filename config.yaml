# Course Scout Configuration

global:
  lookback_days: 1
  report_format: "pdf"
  timezone: "America/New_York"
  window_mode: "rolling"

# Default agent config (overridable per task)
agent_defaults:
  summarizer_model: "claude-sonnet-4-6"
  chunk_size: 25
  max_messages: 100
  thinking: "adaptive"
  effort: "medium"

# ── Prompt Templates ──
# Referenced by tasks via system_prompt field.
# Tasks without system_prompt use the default prompt in agents.py.

prompts:
  course_requests: |
    Extract items from art community COURSE REQUEST threads.
    Telegraphic style — no narrative, just structured data.

    ITEM TYPES:
    - category=request: someone asking for a course. Set instructor, platform, status.
      Priority: LOW if unfulfilled. MEDIUM if fulfilled with link or group buy organizing.
    - category=file: someone sharing a download link in reply. Set instructor, platform, password, status=FULFILLED.
      Priority: HIGH.
    - category=discussion: meta-conversation about availability, alternatives. Priority: LOW.

    Note group buy tags. Description: 1 line — what the course covers.

    RULES:
    - msg_ids required for every item
    - Do not hallucinate links
    - Return valid JSON matching the schema

  file_sharing: |
    Extract items from art community FILE SHARING threads.
    Telegraphic style — no narrative, just structured data.

    ITEM TYPES:
    - category=file: shared download. Set instructor, platform (Baidu Pan, Quark Pan, Mega, Telegram),
      password (PRESERVE EXACTLY), status=FULFILLED. Priority: HIGH.
    - category=request: re-upload request with no resolution. Priority: LOW.
    - category=discussion: access help, format questions. Priority: LOW.

    Translate Chinese/Korean/Japanese titles to English, keep original in parentheses.
    Note: file format, split archives, video quality, subtitle availability.

    RULES:
    - msg_ids required for every item
    - Preserve ALL passwords and access codes exactly
    - Do not hallucinate links
    - Return valid JSON matching the schema

  language_chat: |
    Extract items from MULTILINGUAL art community chat.
    Messages may be in Russian, Korean, Japanese, Spanish, Portuguese, Persian, Hindi, or Urdu.
    Telegraphic style — no narrative, just structured data. Translate everything to English.

    ITEM TYPES:
    - category=file: shared download link/resource. Set instructor, platform, password. Priority: HIGH.
    - category=course: course review or recommendation. Set instructor, platform. Priority: MEDIUM.
    - category=discussion: technique tip, tool comparison. Set instructor if relevant. Priority: MEDIUM.
    - category=request: someone asking for something, no resolution. Priority: LOW.
    - category=announcement: event, stream, new course drop. Priority: MEDIUM.

    Skip casual chat, greetings, memes, off-topic gaming entirely.

    RULES:
    - msg_ids required for every item
    - Preserve original course/artist names alongside translations
    - Do not hallucinate links
    - Return valid JSON matching the schema

  discussion_lounge: |
    Extract items from art DISCUSSION threads.
    Telegraphic style — no narrative, just structured data.

    ITEM TYPES:
    - category=discussion: technique breakdown, tool comparison, style analysis.
      Set instructor if about a specific artist/method. Priority: MEDIUM.
    - category=course: course review or recommendation mentioned in conversation.
      Set instructor, platform. Priority: MEDIUM if verdict given, LOW if just a mention.
    - category=file: shared resource (spreadsheet, reference, brush pack).
      Set platform. Priority: HIGH if downloadable.
    - category=request: someone asking a question with no answer. Priority: LOW.

    Skip: casual greetings, memes, reactions without substance.

    RULES:
    - msg_ids required for every item
    - Preserve shared reference URLs exactly
    - Do not hallucinate links
    - Return valid JSON matching the schema

  course_review: |
    Extract COURSE REVIEWS from art community Telegram messages.
    Telegraphic style — no narrative, just structured data.

    ITEM TYPES:
    - category=course: the review itself. Set instructor, platform, priority.
      Description: verdict, skill level, key takeaways.
      Priority: HIGH if detailed review with clear verdict. MEDIUM if brief opinion.
    - category=discussion: debate about course quality. Set instructor. Priority: MEDIUM.

    RULES:
    - msg_ids required for every item
    - Do not hallucinate links
    - Return valid JSON matching the schema

