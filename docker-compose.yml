services:
  course-scout:
    build: .
    container_name: course-scout-worker
    restart: always
    volumes:
      - ./reports:/app/reports
      - ./media_cache:/app/media_cache
      - ./course_scout.session:/app/course_scout.session
      - ./.env:/app/.env
      - ./config.yaml:/app/config.yaml
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      options:
        max-size: "10m"
        max-file: "3"
